name: Publish Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── Hub ────────────────────────────────────────────────────────────────
      - name: Build & push hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/MyDash.Hub/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/mydash-hub:latest
            ghcr.io/${{ env.OWNER }}/mydash-hub:${{ github.sha }}
          cache-from: type=gha,scope=hub
          cache-to:   type=gha,scope=hub,mode=max

      # ─── Web ────────────────────────────────────────────────────────────────
      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: src/MyDash.Web
          file: src/MyDash.Web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/mydash-web:latest
            ghcr.io/${{ env.OWNER }}/mydash-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max

      # ─── Agent ──────────────────────────────────────────────────────────────
      - name: Build & push agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/MyDash.Agent/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/mydash-agent:latest
            ghcr.io/${{ env.OWNER }}/mydash-agent:${{ github.sha }}
          cache-from: type=gha,scope=agent
          cache-to:   type=gha,scope=agent,mode=max

      # ─── DB Init (DACPAC) ───────────────────────────────────────────────────
      - name: Build & push db-init
        uses: docker/build-push-action@v6
        with:
          context: .
          file: db/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/mydash-db-init:latest
            ghcr.io/${{ env.OWNER }}/mydash-db-init:${{ github.sha }}
          cache-from: type=gha,scope=db-init
          cache-to:   type=gha,scope=db-init,mode=max
