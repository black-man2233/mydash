syntax = "proto3";
package mydash.fleet.v1;
option csharp_namespace = "MyDash.Contracts.Fleet.V1";

service FleetService {
  rpc ListServers       (ListServersRequest)       returns (ListServersResponse);
  rpc GetServer         (GetServerRequest)         returns (Server);
  rpc ListServices      (ListServicesRequest)      returns (ListServicesResponse);
  rpc AddService        (AddServiceRequest)        returns (Service);
  rpc RemoveService     (RemoveServiceRequest)     returns (Empty);
  rpc CreateEnrollment  (CreateEnrollmentRequest)  returns (CreateEnrollmentResponse);
  rpc ListEnrollments   (Empty)                    returns (ListEnrollmentsResponse);
  rpc RevokeEnrollment  (RevokeEnrollmentRequest)  returns (Empty);
  rpc RevokeAgent       (RevokeAgentRequest)       returns (Empty);
  rpc TriggerScan       (TriggerScanRequest)       returns (Empty);
  rpc StreamScan        (StreamScanRequest)        returns (stream ScanLogLine);
  rpc ListAuditEntries  (ListAuditRequest)         returns (ListAuditResponse);
  rpc StreamEnrollment  (StreamEnrollmentRequest)  returns (stream EnrollmentEvent);
}

message Empty {}
message Server {
  string id = 1; string name = 2; string full_name = 3; string tailscale_host = 4;
  string color = 5; string initial = 6; repeated string tags = 7; string os = 8;
  string status = 9; int64 enrolled_at_unix = 10; string agent_version = 11;
  string fingerprint = 12; int64 last_heartbeat_unix = 13; double cpu = 14;
  double mem = 15; double disk = 16; int32 cpu_cores = 17; string mem_total = 18;
  string disk_total = 19; int64 uptime_seconds = 20; bool agent_update_available = 21;
}
message Service {
  string id = 1; string server_id = 2; string name = 3; int32 port = 4;
  string service_type = 5; string docker_image = 6; repeated string tags = 7;
  string description = 8; string icon_color = 9; string icon_glyph = 10;
  string status = 11; int64 last_check_unix = 12;
}
message ListServersRequest {}
message ListServersResponse { repeated Server servers = 1; }
message GetServerRequest { string id = 1; }
message ListServicesRequest { string server_id = 1; string tag_filter = 2; string name_filter = 3; }
message ListServicesResponse { repeated Service services = 1; }
message AddServiceRequest { string server_id = 1; Service service = 2; }
message RemoveServiceRequest { string id = 1; }
message CreateEnrollmentRequest { string name = 1; repeated string tags = 2; int32 ttl_minutes = 3; }
message CreateEnrollmentResponse { string token_plaintext = 1; int64 expires_at_unix = 2; }
message ListEnrollmentsResponse { repeated EnrollmentTokenInfo tokens = 1; }
message EnrollmentTokenInfo { string id = 1; string name = 2; int64 created_at_unix = 3; int64 expires_at_unix = 4; bool consumed = 5; }
message RevokeEnrollmentRequest { string id = 1; }
message RevokeAgentRequest { string server_id = 1; }
message TriggerScanRequest { string server_id = 1; int32 from_port = 2; int32 to_port = 3; }
message StreamScanRequest { string server_id = 1; int32 from_port = 2; int32 to_port = 3; }
message ScanLogLine { double timestamp_seconds = 1; string level = 2; string message = 3; }
message ListAuditRequest { int32 limit = 1; int64 since_unix = 2; }
message ListAuditResponse { repeated AuditEntry entries = 1; }
message AuditEntry { string id = 1; int64 at_unix = 2; string actor = 3; string action = 4; string target = 5; string ip = 6; string outcome = 7; }
message StreamEnrollmentRequest { string token_id = 1; }
message EnrollmentEvent { string event_type = 1; string server_id = 2; string server_name = 3; }
