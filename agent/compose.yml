services:
  mydash-agent:
    build:
      context: ..
      dockerfile: src/MyDash.Agent/Dockerfile
    environment:
      MYDASH_HUB: "${MYDASH_HUB}"
      MYDASH_TOKEN: "${MYDASH_TOKEN}"
      MYDASH_NAME: "${MYDASH_NAME:-}"
    volumes:
      - agent-data:/var/lib/mydash-agent
      - agent-logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  agent-data:
  agent-logs:
