services:
  mydash-agent:
    image: ghcr.io/black-man2233/mydash-agent:latest
    environment:
      MYDASH_HUB: "${MYDASH_HUB}"       # e.g. http://192.168.1.10:8080
      MYDASH_TOKEN: "${MYDASH_TOKEN}"   # enrollment token from the Fleet page
      MYDASH_NAME: "${MYDASH_NAME:-${HOSTNAME}}"
    volumes:
      - agent-data:/var/lib/mydash-agent
      - agent-logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  agent-data:
  agent-logs:
